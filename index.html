<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Поляков Денис - CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #EAEAEA;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Контейнер для текста, чтобы они не разлетались слишком далеко */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 700;
            font-size: 32px;
            color: #000000;
            margin: 0 0 10px 0;
        }

        h2 {
            font-weight: 600;
            font-size: 18px; /* Уменьшил, чтобы лучше смотрелось на мобильном */
            color: #666;
            margin: 0;
            padding: 0 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 90%;
            max-width: 340px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 72px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 22px;
            font-weight: 600;
            transition: transform 0.1s ease, opacity 0.2s ease;
            box-sizing: border-box;
            color: white;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .linkedin {
            background-color: #5154F0;
        }

        .cv {
            background-color: #4D4D4D;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <header>
        <h1>Поляков Денис</h1>
        <h2>Запрошую до перегляду свого профілю</h2>
    </header>

    <div class="container">
        <a href="https://www.linkedin.com/in/denys-poliakov-6b426436b" class="btn linkedin" target="_blank" rel="noopener noreferrer">
            LinkedIn
        </a>

        <a href="CV Denys Poliakov .pdf" class="btn cv" target="_blank" rel="noopener noreferrer">
            Подивитися CV
        </a>
    </div>

</body>
</html>
