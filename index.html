<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Визитка</title>
    <style>
        /* Основные стили для внешнего вида */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #EDECE8;
            color: #333;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            color: #2c3e50;
        }

        h2 {
            font-size: 1rem;
            margin: 0;
            color: #2c3e50;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 300px;
        }

        /* Стили кнопок */
        .btn {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .linkedin {
            background-color: #0077b5;
        }

        .cv {
            background-color: #E2D694;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Тень для объема */
        .btn {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header>
        <!-- ЗАМЕНИТЕ НА ВАШИ ИМЯ И ФАМИЛИЮ -->
        <h1>Поляков Денис</h1>
        <h2>Запрошую до перегляду свого профілю</h2>
    </header>

    <div class="container">
        <!-- ЗАМЕНИТЕ ССЫЛКИ НА ВАШИ -->
        <a href="www.linkedin.com/in/denys-poliakov-6b426436b" class="btn linkedin" target="_blank" rel="noopener noreferrer">
    <div class="icon-box"><span>
    </span></div>
    LinkedIn
</a>
        <a href="CV Denys Poliakov .pdf" class="btn cv" target="_blank">CV (Резюме)</a>
    </div>

</body>
</html>
